<header
    class="flex h-16 items-center justify-between border-b border-slate-200 bg-white px-8 transition-colors duration-300 dark:border-slate-700 dark:bg-slate-800"
>
    <div class="flex items-center gap-4">
        <button
            @click="sidebarOpen = !sidebarOpen"
            type="button"
            class="rounded-lg p-2 transition hover:bg-slate-100 dark:hover:bg-slate-700"
        >
            <i data-lucide="panel-left" class="h-5 w-5"></i>
        </button>

        <h2 class="font-semibold text-slate-900 dark:text-white">Dashboard</h2>
    </div>

    <div class="flex items-center gap-3">
        <button
            id="theme-toggle"
            type="button"
            class="rounded-xl border border-slate-200 p-2 transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-700"
        >
            <i id="theme-icon" data-lucide="moon" class="h-5 w-5"></i>
        </button>

        <a
            href="{{ url_for('auth.logout') }}"
            class="inline-flex items-center gap-2 rounded-xl border border-red-200 px-3 py-2 text-sm text-red-600 transition hover:bg-red-50 dark:border-red-900 dark:text-red-400 dark:hover:bg-red-950/50"
        >
            <i data-lucide="log-out" class="h-4 w-4"></i>

            <span>Logout</span>
        </a>
    </div>
</header>
