<aside
    :class="sidebarOpen ? 'w-64' : 'w-20'"
    class="flex flex-col border-r border-slate-800 bg-slate-900 text-white transition-all duration-300 dark:bg-slate-950"
>
    <!-- Logo -->

    <div class="border-b border-slate-800 px-5 py-6">
        <div class="flex items-center gap-3">
            <div class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-xl bg-blue-600">
                <i data-lucide="box" class="h-6 w-6"></i>
            </div>

            <div x-show="sidebarOpen" x-transition>
                <h1 class="text-2xl font-bold">KubeReport</h1>

                <p class="text-sm text-slate-400">Capacity Platform</p>
            </div>
        </div>
    </div>

    <!-- Navigation -->

    <nav class="flex-1 overflow-y-auto p-4">
        <!-- MAIN -->

        <div x-show="sidebarOpen" class="mb-2 px-4 text-xs font-semibold tracking-wider text-slate-500 uppercase">
            Main
        </div>

        <div class="space-y-1">
            <a
                href="{{ url_for('dashboard.index') }}"
                class="{{
                'bg-blue-600 text-white shadow-lg'
                if request.endpoint == 'dashboard.index'
                else 'text-slate-300 hover:bg-slate-800 hover:text-white'
            }} flex items-center gap-3 rounded-xl px-4 py-3 transition-all duration-200"
            >
                <i data-lucide="layout-dashboard" class="h-5 w-5 flex-shrink-0"></i>

                <span x-show="sidebarOpen" x-transition>Dashboard</span>
            </a>

            <a
                href="{{ url_for('cluster.list_clusters') }}"
                class="{{
                'bg-blue-600 text-white shadow-lg'
                if request.endpoint and request.endpoint.startswith('cluster.')
                else 'text-slate-300 hover:bg-slate-800 hover:text-white'
            }} flex items-center gap-3 rounded-xl px-4 py-3 transition-all duration-200"
            >
                <i data-lucide="server" class="h-5 w-5"></i>

                <span x-show="sidebarOpen" x-transition>Clusters</span>
            </a>
        </div>

        <!-- OPERATIONS -->

        <div x-show="sidebarOpen" class="mt-6 mb-2 px-4 text-xs font-semibold tracking-wider text-slate-500 uppercase">
            Operations
        </div>

        <div x-data="{ inventoryOpen: true }" class="space-y-1">
            <!-- Inventory Parent -->

            <a
                href="{{ url_for('inventory.overview') }}"
                @click="
        if(sidebarOpen){
            inventoryOpen = !inventoryOpen;
            $event.preventDefault();
        }
    "
                class="flex items-center justify-between rounded-xl px-4 py-3 text-slate-300 transition hover:bg-slate-800 hover:text-white"
            >
                <div class="flex items-center gap-3">
                    <i data-lucide="package-search" class="h-5 w-5"></i>

                    <span x-show="sidebarOpen">Inventory</span>
                </div>

                <i
                    x-show="sidebarOpen"
                    :class="inventoryOpen ? 'rotate-90' : ''"
                    data-lucide="chevron-right"
                    class="h-4 w-4 transition-transform"
                ></i>
            </a>

            <!-- Inventory Sub Menu -->

            <div x-show="inventoryOpen && sidebarOpen" x-transition class="ml-6 border-l border-slate-700 pl-4">
                <!-- Overview -->

                <a
                    href="{{ url_for('inventory.overview') }}"
                    class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'inventory.overview'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="layout-grid" class="h-3.5 w-3.5"></i>

                    <span>Overview</span>
                </a>

                <!-- Nodes -->

                <a
                    href="{{ url_for('inventory.nodes') }}"
                    class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'inventory.nodes'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="server" class="h-3.5 w-3.5"></i>

                    <span>Nodes</span>
                </a>

                <!-- Namespaces -->

                <a
                    href="{{ url_for('inventory.namespaces') }}"
                    class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'inventory.namespaces'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="folders" class="h-3.5 w-3.5"></i>

                    <span>Namespaces</span>
                </a>

                <!-- Workloads -->

                <a
                    href="{{ url_for('inventory.workloads') }}"
                    class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'inventory.workloads'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="boxes" class="h-3.5 w-3.5"></i>

                    <span>Workloads</span>
                </a>

                <!-- Pods -->

                <a
                    href="{{ url_for('inventory.pods') }}"
                    class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'inventory.pods'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="box" class="h-3.5 w-3.5"></i>

                    <span>Pods</span>
                </a>

                <!-- Services -->

                <a
                    href="{{ url_for('inventory.services') }}"
                    class="{{
        'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
        if request.endpoint == 'inventory.services'
        else 'text-slate-400 hover:text-white'
    }} flex items-center gap-2 py-2 pl-3 text-sm"
                >
                    <i data-lucide="network" class="h-3.5 w-3.5"></i>

                    <span>Services</span>
                </a>

                <!-- Ingresses -->

                <a
                    href="{{ url_for('inventory.ingresses') }}"
                    class="flex items-center gap-2 py-2 pl-3 text-sm text-slate-400 hover:text-white"
                >
                    <i data-lucide="route" class="h-3.5 w-3.5"></i>

                    <span>Ingresses</span>
                </a>

                <!-- Storage -->

                <a
                    href="{{ url_for('inventory.storage') }}"
                    class="flex items-center gap-2 py-2 pl-3 text-sm text-slate-400 hover:text-white"
                >
                    <i data-lucide="hard-drive" class="h-3.5 w-3.5"></i>

                    <span>Storage</span>
                </a>
            </div>
        </div>

        <!-- ANALYTICS -->

        <div x-show="sidebarOpen" class="mt-6 mb-2 px-4 text-xs font-semibold tracking-wider text-slate-500 uppercase">
            Analytics
        </div>

        <div class="space-y-1">
            <a
                href="#"
                class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-300 transition-all duration-200 hover:bg-slate-800 hover:text-white"
            >
                <i data-lucide="chart-column" class="h-5 w-5"></i>

                <span x-show="sidebarOpen" x-transition>Analytics</span>
            </a>
        </div>

        <!-- SYSTEM -->

        <div x-show="sidebarOpen" class="mt-6 mb-2 px-4 text-xs font-semibold tracking-wider text-slate-500 uppercase">
            System
        </div>

        <div class="space-y-1">
            <a
                href="#"
                class="flex items-center gap-3 rounded-xl px-4 py-3 text-slate-300 transition-all duration-200 hover:bg-slate-800 hover:text-white"
            >
                <i data-lucide="settings" class="h-5 w-5"></i>

                <span x-show="sidebarOpen" x-transition>Settings</span>
            </a>
        </div>
    </nav>

    <!-- User Profile -->
    <div class="border-t border-slate-800 p-4">
        <div class="flex items-center gap-3 rounded-xl p-2">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-600">
                <i data-lucide="user" class="h-5 w-5"></i>
            </div>
            <div x-show="sidebarOpen" x-transition>
                <div class="font-medium">{{ current_user.username }}</div>
                <div class="text-xs text-slate-400">Administrator</div>
            </div>
        </div>
    </div>
</aside>
