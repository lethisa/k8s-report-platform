<header
    class="sticky top-0 z-30 border-b border-slate-200 bg-white backdrop-blur dark:border-slate-700 dark:border-slate-800 dark:bg-slate-800/90 dark:bg-slate-900/90"
>
    <div class="flex h-16 items-center justify-end px-6">
        <button
            @click="
                darkMode = !darkMode;
                localStorage.setItem(
                    'theme',
                    darkMode ? 'dark' : 'light'
                );
            "
            class="rounded-xl bg-slate-100 p-2 transition hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700"
            title="Toggle Theme"
        >
            <i
                x-show="!darkMode"
                data-lucide="moon"
                class="h-5 w-5 text-slate-700"
            ></i>

            <i
                x-show="darkMode"
                data-lucide="sun"
                class="h-5 w-5 text-yellow-400"
            ></i>
        </button>
    </div>
</header>
