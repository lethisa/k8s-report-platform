<div
    x-data="{
        settingsOpen:
            {{ 'true' if request.endpoint and request.endpoint.startswith('settings.') else 'false' }}
    }"
    class="space-y-1"
>
    <!-- Settings Parent -->

    <a
        href="{{ url_for('settings.general') }}"
        @click="
            if(sidebarOpen){
                settingsOpen = !settingsOpen;
                $event.preventDefault();
            }
        "
        class="flex items-center justify-between rounded-xl px-4 py-3 text-slate-300 transition hover:bg-slate-800 hover:text-white"
    >
        <div class="flex items-center gap-3">
            <i data-lucide="settings" class="h-5 w-5"></i>

            <span x-show="sidebarOpen">Settings</span>
        </div>

        <i
            x-show="sidebarOpen"
            :class="settingsOpen ? 'rotate-90' : ''"
            data-lucide="chevron-right"
            class="h-4 w-4 transition-transform"
        ></i>
    </a>

    <!-- Settings Sub Menu -->

    <div x-show="settingsOpen && sidebarOpen" x-transition class="ml-6 border-l border-slate-700 pl-4">
        <!-- General -->

        <a
            href="{{ url_for('settings.general') }}"
            class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'settings.general'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
        >
            <i data-lucide="sliders-horizontal" class="h-3.5 w-3.5"></i>

            <span>General</span>
        </a>

        <!-- Prometheus -->

        <a
            href="{{ url_for('settings.prometheus') }}"
            class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'settings.prometheus'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
        >
            <i data-lucide="activity" class="h-3.5 w-3.5"></i>

            <span>Prometheus</span>
        </a>

        <!-- Reports -->

        <a
            href="{{ url_for('settings.reports') }}"
            class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'settings.reports'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
        >
            <i data-lucide="file-text" class="h-3.5 w-3.5"></i>

            <span>Reports</span>
        </a>

        <!-- System Information -->

        <a
            href="{{ url_for('settings.system_info') }}"
            class="{{
                'border-l-2 border-blue-500 bg-blue-500/10 text-blue-400'
                if request.endpoint == 'settings.system_info'
                else 'text-slate-400 hover:text-white'
            }} flex items-center gap-2 py-2 pl-3 text-sm"
        >
            <i data-lucide="server-cog" class="h-3.5 w-3.5"></i>

            <span>System Information</span>
        </a>
    </div>
</div>
