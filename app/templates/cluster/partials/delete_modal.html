<div x-show="deleteModal"
     x-transition.opacity
     class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 px-4 backdrop-blur-sm"
     x-cloak>
    <div @click.away="deleteModal = false"
         x-transition
         class="w-full max-w-md overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-800">
        <div class="p-6">
            <div class="mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-red-100 text-red-600 dark:bg-red-500/10 dark:text-red-300">
                <i data-lucide="trash-2" class="h-6 w-6"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-950 dark:text-white">Delete Cluster</h3>
            <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">
                Are you sure you want to delete
                <span class="font-semibold text-slate-900 dark:text-white"
                      x-text="deleteName"></span>
                ?
            </p>
            <p class="mt-1 text-sm font-medium text-red-600 dark:text-red-300">This action cannot be undone.</p>
            <div class="mt-4 rounded-xl border border-red-200 bg-red-50 p-3 dark:border-red-500/20 dark:bg-red-500/10">
                <p class="text-xs text-red-700 dark:text-red-300">
                    Deleting a cluster will remove associated inventory records and Prometheus configuration.
                </p>
            </div>
        </div>
        <div class="flex justify-end gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4 dark:border-slate-700 dark:bg-slate-900/40">
            <button type="button"
                    @click="deleteModal = false"
                    class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                Cancel
            </button>
            <form :action="deleteUrl" method="POST">
                <button type="submit"
                        class="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-700 dark:bg-red-600 dark:hover:bg-red-500">
                    Delete Cluster
                </button>
            </form>
        </div>
    </div>
</div>
