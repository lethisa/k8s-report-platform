{% if cluster.status == "connected" %}

<span class="inline-flex items-center rounded-full bg-green-100 px-3 py-1 text-xs font-medium text-green-700">
    Connected
</span>

{% elif cluster.status == "failed" %}

<span class="inline-flex items-center rounded-full bg-red-100 px-3 py-1 text-xs font-medium text-red-700">Failed</span>

{% else %}

<span class="inline-flex items-center rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700">
    Unknown
</span>

{% endif %}
