{% if cluster.status == "connected" %}

<span
    class="inline-flex items-center rounded-full bg-green-100 px-3 py-1 text-xs font-medium text-green-700 dark:bg-green-500/10 dark:text-green-300"
>
    Connected
</span>

{% elif cluster.status == "failed" %}

<span
    class="inline-flex items-center rounded-full bg-red-100 px-3 py-1 text-xs font-medium text-red-700 dark:bg-red-500/10 dark:text-red-300"
>
    Failed
</span>

{% else %}

<span
    class="inline-flex items-center rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-700 dark:bg-amber-500/10 dark:text-amber-300"
>
    Unknown
</span>

{% endif %}
