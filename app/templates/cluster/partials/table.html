<div id="cluster-table-container" class="overflow-x-auto">
    <!-- Filter Bar -->
    <div class="flex flex-col gap-3 border-b border-slate-200 px-6 py-4 md:flex-row md:items-center md:justify-between dark:border-slate-700">
        <div class="relative w-full lg:max-w-lg">
            <i data-lucide="search"
               class="absolute top-3 left-3 h-4 w-4 text-slate-400 dark:text-slate-500"></i>
            <input x-model="search"
                   type="text"
                   placeholder="Search clusters..."
                   class="w-full rounded-xl border border-slate-300 bg-white py-2 pr-3 pl-10 text-sm text-slate-900 transition outline-none placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-slate-600 dark:bg-slate-950/40 dark:text-slate-100 dark:placeholder:text-slate-500 dark:focus:border-blue-400 dark:focus:ring-blue-400/10" />
        </div>
        <select x-model="envFilter"
                class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 transition outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 dark:border-slate-600 dark:bg-slate-950/40 dark:text-slate-100 dark:focus:border-blue-400 dark:focus:ring-blue-400/10">
            <option value="all">All Environments</option>
            <option value="prd">Production</option>
            <option value="stg">Staging</option>
            <option value="dev">Development</option>
        </select>
    </div>
    <!-- Table -->
    <table class="min-w-full text-slate-900 dark:text-slate-100">
        <thead>
            <tr class="border-b border-slate-200 bg-slate-50 text-xs tracking-wide text-slate-600 uppercase dark:border-slate-700 dark:bg-slate-700/40 dark:text-slate-300">
                <th class="px-6 py-4 text-left">Name</th>
                <th class="px-6 py-4 text-center">Environment</th>
                <th class="px-6 py-4 text-center">Status</th>
                <th class="px-6 py-4 text-center">Nodes</th>
                <th class="px-6 py-4 text-center">K8S Version</th>
                <th class="px-6 py-4 text-center">Namespaces</th>
                <th class="px-6 py-4 text-center">Inventory</th>
                <th class="px-6 py-4 text-center">Prometheus</th>
                <th class="px-6 py-4 text-center">Last Check</th>
                <th class="w-64 px-6 py-4 text-center">Actions</th>
            </tr>
        </thead>
        <tbody id="cluster-table-body">
            {% for cluster in clusters %}
                {% include "cluster/partials/row.html" %}
            {% else %}
                <tr>
                    <td colspan="10"
                        class="py-16 text-center text-slate-400 dark:text-slate-500">
                        <div class="flex flex-col items-center gap-3">
                            <i data-lucide="server-off" class="h-12 w-12"></i>
                            <div>
                                <div class="font-medium text-slate-700 dark:text-slate-300">No Clusters Found</div>
                                <div class="text-sm text-slate-500 dark:text-slate-400">Add your first Kubernetes cluster.</div>
                                <a href="{{ url_for('cluster.add_cluster') }}"
                                   class="mt-4 inline-flex items-center rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 dark:hover:bg-blue-500">
                                    Add Cluster
                                </a>
                            </div>
                        </div>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
