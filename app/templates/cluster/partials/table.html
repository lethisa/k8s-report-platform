<div id="cluster-table-container" class="overflow-x-auto">
    <div
        class="flex flex-col gap-3 border-b border-slate-200 px-6 py-4 md:flex-row md:items-center md:justify-between dark:border-slate-700"
    >
        <div class="relative w-full lg:max-w-lg">
            <i data-lucide="search" class="absolute top-3 left-3 h-4 w-4 text-slate-400"></i>

            <input
                x-model="search"
                type="text"
                placeholder="Search clusters..."
                class="w-full rounded-xl border border-slate-300 bg-white py-2 pr-3 pl-10 text-sm text-slate-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none dark:border-slate-600 dark:bg-slate-900 dark:text-white dark:focus:ring-blue-900/30"
            />
        </div>

        <select
            x-model="envFilter"
            class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm text-slate-900 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none dark:border-slate-600 dark:bg-slate-900 dark:text-white dark:focus:ring-blue-900/30"
        >
            <option value="all">All Environments</option>
            <option value="prd">Production</option>
            <option value="stg">Staging</option>
            <option value="dev">Development</option>
        </select>
    </div>

    <table class="min-w-full">
        <thead>
            <tr
                class="border-b border-slate-200 bg-slate-50 text-xs tracking-wide text-slate-500 uppercase dark:border-slate-700 dark:bg-slate-900/50 dark:text-slate-400"
            >
                <th class="px-6 py-4 text-left">Name</th>
                <th class="px-6 py-4 text-center">Environment</th>
                <th class="px-6 py-4 text-center">Status</th>
                <th class="px-6 py-4 text-center">Nodes</th>
                <th class="px-6 py-4 text-center">K8S Version</th>
                <th class="px-6 py-4 text-center">Namespaces</th>
                <th class="px-6 py-4 text-center">Inventory</th>
                <th class="px-6 py-4 text-center">Prometheus</th>
                <th class="px-6 py-4 text-center">Last Check</th>
                <th class="w-64 px-6 py-4 text-center">Actions</th>
            </tr>
        </thead>

        <tbody id="cluster-table-body">
            {% for cluster in clusters %} {% include "cluster/partials/row.html" %} {% else %}
            <tr>
                <td colspan="10" class="py-16 text-center text-slate-400">
                    <div class="flex flex-col items-center gap-3">
                        <i data-lucide="server-off" class="h-12 w-12"></i>

                        <div>
                            <div class="font-medium">No Clusters Found</div>
                            <div class="text-sm">Add your first Kubernetes cluster.</div>

                            <a
                                href="{{ url_for('cluster.add_cluster') }}"
                                class="mt-4 inline-flex items-center rounded-xl bg-blue-600 px-4 py-2 text-white"
                            >
                                Add Cluster
                            </a>
                        </div>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
