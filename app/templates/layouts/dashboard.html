<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />

        <title>{% block title %} KubeReport {% endblock %}</title>

        <script>
            ;(function () {
                const theme = localStorage.getItem('theme')

                if (theme === 'dark') {
                    document.documentElement.classList.add('dark')
                }
            })()
        </script>

        <style>
            [x-cloak] {
                display: none !important;
            }
        </style>

        <link rel="preconnect" href="https://fonts.googleapis.com" />

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}" />
    </head>

    <body
        class="bg-slate-50 font-sans text-slate-900 antialiased transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 dark:text-white"
    >
        <div x-data="{ sidebarOpen: true }" class="flex h-screen overflow-hidden">
            {% include "components/navigation/sidebar.html" %}

            <div class="flex flex-1 flex-col overflow-hidden">
                {% include "components/navigation/navbar.html" %}

                <main class="flex-1 overflow-y-auto bg-slate-50 transition-colors duration-300 dark:bg-slate-900">
                    <div class="p-6 lg:p-8">{% block dashboard_content %} {% endblock %}</div>
                </main>
            </div>
        </div>

        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

        <script src="https://unpkg.com/htmx.org@2.0.4"></script>

        <script src="https://unpkg.com/lucide@latest"></script>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                lucide.createIcons()
            })

            document.body.addEventListener('htmx:afterSwap', () => {
                if (window.lucide) {
                    lucide.createIcons()
                }
            })
        </script>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const button = document.getElementById('theme-toggle')

                if (!button) return

                button.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark')

                    const dark = document.documentElement.classList.contains('dark')

                    localStorage.setItem('theme', dark ? 'dark' : 'light')
                })
            })
        </script>
    </body>
</html>
